<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snake Browser Game</title>

  <style>
    :root {
      --lcd-bg: #9ead86;
      --lcd-grid: #8c9b76;
      --lcd-dark: #2f3b2f;
      --lcd-mid: #445244;
      --frame: #78856a;
      --button-bg: #cfcfcf;
      --button-border: #8e8e8e;
      --button-text: #2f2f2f;
      --button-active-glow: rgba(190, 255, 118, 0.85);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100dvh;
      background: #7d8790;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      padding-bottom: max(16px, calc(16px + env(safe-area-inset-bottom)));
      overflow: hidden;
      touch-action: none;
    }

    .game-wrapper {
      width: min(94vw, 420px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .screen {
      width: 100%;
      background: var(--lcd-bg);
      border: 4px solid var(--frame);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    }

    .screen-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--lcd-dark);
      background: var(--lcd-bg);
      border-bottom: 2px solid var(--frame);
      padding: 8px 10px;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .scoreboard {
      display: flex;
      gap: 10px;
      align-items: center;
      white-space: nowrap;
    }

    .screen-area {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--lcd-bg);
      touch-action: none;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--lcd-bg);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(158, 173, 134, 0.94);
      color: var(--lcd-dark);
      text-align: center;
      padding: 20px;
    }

    .overlay.hidden {
      display: none;
    }

    .hidden {
      display: none;
    }

    .overlay-card {
      max-width: 300px;
    }

    .overlay-card h2 {
      margin: 0 0 12px;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    .overlay-card p {
      margin: 8px 0;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 2px solid var(--button-border);
      background: linear-gradient(to bottom, #cfcfcf, #afafaf);
      color: var(--button-text);
      font: inherit;
      font-weight: bold;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      min-width: 92px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        0 2px 0 rgba(0,0,0,0.12);
    }

    button:active {
      transform: translateY(1px);
    }

    #soundButton {
      min-width: 70px;
      padding: 5px 7px;
      font-size: 0.68rem;
      letter-spacing: 0;
    }

    .mobile-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: min(8px, 2vw);
      /* Square fallback: width: min(260px, 76vw, 34dvh); aspect-ratio: 1; */
      width: min(312px, 89vw, 40.5dvh);
      aspect-ratio: 1.35 / 1;
      padding: 0;
      place-content: center;
      touch-action: none;
    }

    .mobile-pad button {
      --pad-button-offset-x: 0px;
      display: grid;
      place-items: center;
      min-width: 0;
      width: 100%;
      height: 100%;
      padding: 0;
      border-radius: 18px;
      font-size: 1.6rem;
      line-height: 1;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      transform: translateX(var(--pad-button-offset-x));
      transition: transform 110ms ease-out, filter 110ms ease-out, box-shadow 110ms ease-out;
    }

    .up {
      grid-column: 2;
      grid-row: 1;
    }

    .left {
      --pad-button-offset-x: -4px;
      grid-column: 1;
      grid-row: 2;
    }

    .right {
      --pad-button-offset-x: 4px;
      grid-column: 3;
      grid-row: 2;
    }

    .down {
      grid-column: 2;
      grid-row: 3;
    }

    .mobile-pad button:active {
      transform: translateX(var(--pad-button-offset-x)) scale(0.90);
      filter: brightness(0.92);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        inset 0 0 0 3px var(--button-active-glow),
        0 0 0 4px rgba(190, 255, 118, 0.32),
        0 0 18px 7px rgba(190, 255, 118, 0.42);
    }

    .hint {
      text-align: center;
      color: #2f2f2f;
      font-size: 0.82rem;
      margin-top: 2px;
      line-height: 1.35;
    }

    @media (min-width: 760px) {
      .mobile-pad {
        display: none;
      }
    }

    @media (max-width: 759px) {
      body {
        align-items: flex-start;
        padding: 10px 12px;
        padding-bottom: max(10px, calc(10px + env(safe-area-inset-bottom)));
      }

      .game-wrapper {
        width: min(94vw, 420px, max(220px, calc(100dvh - 380px)));
        gap: 8px;
      }

      .controls {
        gap: 8px;
      }

      .action-row {
        margin-top: 16px;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="game-wrapper">
    <section class="screen" aria-label="Snake display">
      <div class="screen-top">
        <span>SNAKE</span>
        <button id="soundButton" aria-pressed="true">SOUND ON</button>
        <span class="scoreboard">
          <span>SCORE <span id="score">0</span></span>
          <span>HIGH <span id="highScore">0</span></span>
        </span>
      </div>

      <div class="screen-area">
        <canvas id="game" width="360" height="360"></canvas>

        <div id="overlay" class="overlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">SNAKE</h2>
            <p id="overlayText">Use arrow keys, WASD, continuous swipe, or buttons.</p>
            <p>Eat food. Avoid yourself.</p>
            <div class="overlay-actions">
              <button id="startButton">START</button>
              <button id="cancelButton" class="hidden">CANCEL</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="controls">
      <div class="mobile-pad" aria-label="Touch controls">
        <button class="up" data-direction="up" aria-label="Move up">▲</button>
        <button class="left" data-direction="left" aria-label="Move left">◀</button>
        <button class="right" data-direction="right" aria-label="Move right">▶</button>
        <button class="down" data-direction="down" aria-label="Move down">▼</button>
      </div>

      <div class="action-row">
        <button id="pauseButton">PAUSE</button>
        <button id="restartButton">RESTART</button>
      </div>

      <div class="hint">
        Desktop: Arrow keys or WASD<br />
        Mobile: Hold finger down and swipe continuously, or use buttons
      </div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");

    const scoreElement = document.getElementById("score");
    const highScoreElement = document.getElementById("highScore");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const cancelButton = document.getElementById("cancelButton");
    const pauseButton = document.getElementById("pauseButton");
    const restartButton = document.getElementById("restartButton");
    const soundButton = document.getElementById("soundButton");

    const gridSize = 18;
    const tileCount = canvas.width / gridSize;
    const AudioContextConstructor = window.AudioContext || window.webkitAudioContext;
    const highScoreStorageKey = "snakeBrowserGameHighScore";

    const colors = {
      bg: "#9ead86",
      grid: "#8c9b76",
      snake: "#2f3b2f",
      food: "#445244"
    };

    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let highScore = loadHighScore();
    let gameInterval;
    let isRunning;
    let isPaused;
    let isGameOver;
    let restartConfirmationPending = false;
    let restartConfirmationWasRunning = false;
    let audioContext = null;
    let audioUnlocked = false;
    let soundEnabled = true;
    let speed;

    function ensureAudioContext() {
      if (!AudioContextConstructor) return null;

      if (!audioContext) {
        audioContext = new AudioContextConstructor();
      }

      return audioContext;
    }

    function resumeAudioContext() {
      const currentAudioContext = ensureAudioContext();
      if (!currentAudioContext) return Promise.resolve(null);

      if (audioContext.state === "suspended") {
        return audioContext.resume().then(() => audioContext);
      }

      return Promise.resolve(audioContext);
    }

    function unlockAudio() {
      if (audioUnlocked || !soundEnabled) return;

      resumeAudioContext().then(currentAudioContext => {
        if (!currentAudioContext || audioUnlocked) return;

        const silentBuffer = audioContext.createBuffer(1, 1, 22050);
        const silentSource = audioContext.createBufferSource();

        silentSource.buffer = silentBuffer;
        silentSource.connect(audioContext.destination);
        silentSource.start(0);
        audioUnlocked = true;
      });
    }

    function playTone(frequency, startDelay = 0, duration = 0.06, volume = 0.09) {
      if (!soundEnabled) return;

      const currentAudioContext = ensureAudioContext();
      if (!currentAudioContext) return;

      const startAt = currentAudioContext.currentTime + startDelay;
      const stopAt = startAt + duration;
      const oscillator = currentAudioContext.createOscillator();
      const gain = currentAudioContext.createGain();

      oscillator.type = "square";
      oscillator.frequency.setValueAtTime(frequency, startAt);
      gain.gain.setValueAtTime(volume, startAt);
      gain.gain.exponentialRampToValueAtTime(0.0001, stopAt);

      oscillator.connect(gain);
      gain.connect(currentAudioContext.destination);
      oscillator.start(startAt);
      oscillator.stop(stopAt);
    }

    function playSequence(notes) {
      notes.forEach(note => {
        playTone(note.frequency, note.delay, note.duration, note.volume);
      });
    }

    function playSound(soundName) {
      const sounds = {
        turn: [{ frequency: 880, delay: 0, duration: 0.035, volume: 0.08 }],
        food: [
          { frequency: 784, delay: 0, duration: 0.065, volume: 0.09 },
          { frequency: 1175, delay: 0.07, duration: 0.085, volume: 0.09 }
        ],
        start: [
          { frequency: 523, delay: 0, duration: 0.06, volume: 0.085 },
          { frequency: 659, delay: 0.065, duration: 0.07, volume: 0.085 }
        ],
        pause: [{ frequency: 392, delay: 0, duration: 0.08, volume: 0.09 }],
        gameOver: [
          { frequency: 440, delay: 0, duration: 0.1, volume: 0.09 },
          { frequency: 330, delay: 0.105, duration: 0.12, volume: 0.09 },
          { frequency: 220, delay: 0.23, duration: 0.17, volume: 0.09 }
        ]
      };

      if (!sounds[soundName]) return;

      playSequence(sounds[soundName]);
    }

    function updateSoundButton() {
      soundButton.textContent = soundEnabled ? "SOUND ON" : "SOUND OFF";
      soundButton.setAttribute("aria-pressed", String(soundEnabled));
    }

    function toggleSound() {
      soundEnabled = !soundEnabled;
      updateSoundButton();

      if (soundEnabled) {
        resumeAudioContext().then(() => {
          playSound("start");
        });
      }
    }

    function loadHighScore() {
      try {
        const storedHighScore = Number(localStorage.getItem(highScoreStorageKey));
        return Number.isFinite(storedHighScore) && storedHighScore > 0 ? storedHighScore : 0;
      } catch {
        return 0;
      }
    }

    function saveHighScore() {
      try {
        localStorage.setItem(highScoreStorageKey, String(highScore));
      } catch {
        // Storage can be blocked in private mode; the game should still play.
      }
    }

    function updateHighScore() {
      if (score <= highScore) return;

      highScore = score;
      highScoreElement.textContent = highScore;
      saveHighScore();
    }

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = directions.right;
      nextDirection = directions.right;
      score = 0;
      speed = 180;
      isRunning = false;
      isPaused = false;
      isGameOver = false;

      updateScore();
      placeFood();
      drawGame();
    }

    function startGame() {
      if (isGameOver) {
        resetGame();
      }

      clearInterval(gameInterval);
      isRunning = true;
      isPaused = false;
      playSound("start");
      pauseButton.textContent = "PAUSE";
      resetRestartConfirmation();
      overlay.classList.add("hidden");
      gameInterval = setInterval(gameLoop, speed);
    }

    function restartGame() {
      clearInterval(gameInterval);
      resetRestartConfirmation();
      resetGame();
      startGame();
    }

    function resetRestartConfirmation() {
      restartConfirmationPending = false;
      restartConfirmationWasRunning = false;
      restartButton.textContent = "RESTART";
      restartButton.style.order = "";
      pauseButton.style.order = "";
      cancelButton.classList.add("hidden");
    }

    function requestRestart() {
      if (restartConfirmationPending) {
        restartGame();
        return;
      }

      restartConfirmationWasRunning = isRunning && !isPaused;
      restartConfirmationPending = true;
      restartButton.textContent = "CONFIRM";
      pauseButton.textContent = "CANCEL";
      restartButton.style.order = 1;
      pauseButton.style.order = 2;
      cancelButton.classList.remove("hidden");
      showOverlay("RESTART?", "Confirm restart or cancel to resume.", "CONFIRM");

      if (restartConfirmationWasRunning) {
        clearInterval(gameInterval);
        isPaused = true;
      }
    }

    function cancelRestartConfirmation() {
      const shouldResume = restartConfirmationWasRunning;
      resetRestartConfirmation();
      overlay.classList.add("hidden");

      if (shouldResume) {
        isPaused = false;
        pauseButton.textContent = "PAUSE";
        gameInterval = setInterval(gameLoop, speed);
        return;
      }

      pauseButton.textContent = isPaused ? "RESUME" : "PAUSE";
    }

    function pauseGame() {
      if (!isRunning) return;

      if (restartConfirmationPending) {
        cancelRestartConfirmation();
        return;
      }

      resetRestartConfirmation();
      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? "RESUME" : "PAUSE";

      if (isPaused) {
        clearInterval(gameInterval);
        playSound("pause");
        showOverlay("PAUSED", "Press resume, space, or start.", "RESUME");
      } else {
        overlay.classList.add("hidden");
        playSound("start");
        gameInterval = setInterval(gameLoop, speed);
      }
    }

    function gameLoop() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;

      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        playSound("food");
        placeFood();
        increaseSpeed();
      } else {
        snake.pop();
      }

      drawGame();
    }

    function increaseSpeed() {
      if (speed <= 110) return;

      speed -= 1;
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, speed);
    }

    function placeFood() {
      let newFood;

      do {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));

      food = newFood;
    }

    function drawGame() {
      context.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    function drawGrid() {
      context.fillStyle = colors.bg;
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.strokeStyle = colors.grid;
      context.lineWidth = 1;

      for (let i = 0; i <= tileCount; i++) {
        const position = i * gridSize;

        context.beginPath();
        context.moveTo(position, 0);
        context.lineTo(position, canvas.height);
        context.stroke();

        context.beginPath();
        context.moveTo(0, position);
        context.lineTo(canvas.width, position);
        context.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        context.fillStyle = colors.snake;

        const padding = 2;
        context.fillRect(
          segment.x * gridSize + padding,
          segment.y * gridSize + padding,
          gridSize - padding * 2,
          gridSize - padding * 2
        );

        if (index === 0) {
          drawSnakeEyes(segment);
        }
      });
    }

    function drawSnakeEyes(head) {
      context.fillStyle = colors.bg;

      const baseX = head.x * gridSize;
      const baseY = head.y * gridSize;
      const eyeSize = 2;

      if (direction.x !== 0) {
        context.fillRect(baseX + 5, baseY + 5, eyeSize, eyeSize);
        context.fillRect(baseX + 5, baseY + 11, eyeSize, eyeSize);
      } else {
        context.fillRect(baseX + 5, baseY + 5, eyeSize, eyeSize);
        context.fillRect(baseX + 11, baseY + 5, eyeSize, eyeSize);
      }
    }

    function drawFood() {
      context.fillStyle = colors.food;

      const x = food.x * gridSize + 4;
      const y = food.y * gridSize + 4;
      const size = gridSize - 8;

      context.fillRect(x, y, size, size);
    }

    function updateScore() {
      scoreElement.textContent = score;
      highScoreElement.textContent = highScore;
      updateHighScore();
    }

    function endGame() {
      clearInterval(gameInterval);
      isRunning = false;
      isPaused = false;
      isGameOver = true;
      playSound("gameOver");
      pauseButton.textContent = "PAUSE";
      showOverlay("GAME OVER", `FINAL SCORE: ${score}`, "PLAY");
    }

    function showOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      startButton.textContent = buttonText;
      overlay.classList.remove("hidden");
    }

    function vibrate(pattern = 12) {
      if (!navigator.vibrate) return;

      navigator.vibrate(pattern);
    }

    function setDirection(newDirection) {
      const chosen = directions[newDirection];
      if (!chosen) return false;

      if (restartConfirmationPending) return false;

      const isOpposite =
        chosen.x + direction.x === 0 &&
        chosen.y + direction.y === 0;
      const isSameAsNext =
        chosen.x === nextDirection.x &&
        chosen.y === nextDirection.y;

      if (isOpposite || isSameAsNext) {
        return false;
      }

      nextDirection = chosen;
      playSound("turn");
      return true;
    }

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();

      if (["arrowup", "w"].includes(key)) {
        event.preventDefault();
        setDirection("up");
      }

      if (["arrowdown", "s"].includes(key)) {
        event.preventDefault();
        setDirection("down");
      }

      if (["arrowleft", "a"].includes(key)) {
        event.preventDefault();
        setDirection("left");
      }

      if (["arrowright", "d"].includes(key)) {
        event.preventDefault();
        setDirection("right");
      }

      if (key === " " || key === "spacebar") {
        event.preventDefault();
        if (!isRunning) {
          restartGame();
        } else {
          pauseGame();
        }
      }

      if (key === "enter" && !isRunning) {
        restartGame();
      }
    });

    document.querySelectorAll("[data-direction]").forEach(button => {
      button.addEventListener("pointerdown", () => {
        vibrate();
        if (!isRunning) {
          restartGame();
        }
        setDirection(button.dataset.direction);
      });
    });

    startButton.addEventListener("pointerdown", () => {
      if (restartConfirmationPending) {
        vibrate([18, 40, 18]);
        restartGame();
        return;
      }

      vibrate();

      if (isPaused) {
        pauseGame();
      } else {
        restartGame();
      }
    });

    cancelButton.addEventListener("pointerdown", () => {
      vibrate();
      cancelRestartConfirmation();
    });

    pauseButton.addEventListener("pointerdown", () => {
      vibrate();
      pauseGame();
    });

    restartButton.addEventListener("pointerdown", () => {
      vibrate(restartConfirmationPending ? [18, 40, 18] : 12);
      requestRestart();
    });

    soundButton.addEventListener("pointerdown", () => {
      toggleSound();
    });

    document.addEventListener("pointerdown", unlockAudio, { capture: true });

    const swipeThreshold = 24;
    let touchLastX = null;
    let touchLastY = null;
    let touchStartX = null;
    let touchStartY = null;
    let touchStartedOnCanvas = false;
    let swipeDirectionApplied = false;

    function applySwipeDirection(newDirection) {
      if (!isRunning) {
        restartGame();
      }

      setDirection(newDirection);
    }

    function getTapDirection(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();

      if (
        clientX < rect.left ||
        clientX > rect.right ||
        clientY < rect.top ||
        clientY > rect.bottom
      ) {
        return null;
      }

      const head = snake[0];
      if (!head) return null;

      const canvasX = ((clientX - rect.left) / rect.width) * canvas.width;
      const canvasY = ((clientY - rect.top) / rect.height) * canvas.height;
      const headCenterX = head.x * gridSize + gridSize / 2;
      const headCenterY = head.y * gridSize + gridSize / 2;
      const deltaX = canvasX - headCenterX;
      const deltaY = canvasY - headCenterY;

      if (deltaX === 0 && deltaY === 0) {
        return null;
      }

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        return deltaX > 0 ? "right" : "left";
      }

      return deltaY > 0 ? "down" : "up";
    }

    function applyTapDirection(newDirection) {
      if (!newDirection) return;

      if (!isRunning) {
        restartGame();
      }

      setDirection(newDirection);
    }

    function handleSwipeMovement(clientX, clientY) {
      if (touchLastX === null || touchLastY === null) {
        touchLastX = clientX;
        touchLastY = clientY;
        return false;
      }

      const deltaX = clientX - touchLastX;
      const deltaY = clientY - touchLastY;

      if (Math.abs(deltaX) < swipeThreshold && Math.abs(deltaY) < swipeThreshold) {
        return false;
      }

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        applySwipeDirection(deltaX > 0 ? "right" : "left");
      } else {
        applySwipeDirection(deltaY > 0 ? "down" : "up");
      }

      swipeDirectionApplied = true;
      touchLastX = clientX;
      touchLastY = clientY;
      return true;
    }

    function handleTapZone(clientX, clientY) {
      if (!touchStartedOnCanvas || swipeDirectionApplied) {
        return;
      }

      const movedTooFar =
        Math.abs(clientX - touchStartX) >= swipeThreshold ||
        Math.abs(clientY - touchStartY) >= swipeThreshold;

      if (movedTooFar) {
        return;
      }

      applyTapDirection(getTapDirection(clientX, clientY));
    }

    function clearSwipeTracking() {
      touchLastX = null;
      touchLastY = null;
      touchStartX = null;
      touchStartY = null;
      touchStartedOnCanvas = false;
      swipeDirectionApplied = false;
    }

    document.addEventListener("touchstart", event => {
      const touch = event.changedTouches[0];
      const isButtonTouch = event.target.closest("button") !== null;
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      touchLastX = touch.clientX;
      touchLastY = touch.clientY;
      touchStartedOnCanvas = !isButtonTouch && getTapDirection(touch.clientX, touch.clientY) !== null;
      swipeDirectionApplied = false;
    }, { passive: true });

    document.addEventListener("touchstart", unlockAudio, { capture: true, passive: true });

    document.addEventListener("touchmove", event => {
      const touch = event.changedTouches[0];
      handleSwipeMovement(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener("touchend", event => {
      const touch = event.changedTouches[0];
      handleSwipeMovement(touch.clientX, touch.clientY);
      handleTapZone(touch.clientX, touch.clientY);
      clearSwipeTracking();
    }, { passive: true });

    document.addEventListener("touchcancel", () => {
      clearSwipeTracking();
    }, { passive: true });

    resetGame();
  </script>
</body>
</html>
