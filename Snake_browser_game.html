<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nokia LCD Snake</title>

  <style>
    :root {
      --lcd-bg: #9ead86;
      --lcd-grid: #8c9b76;
      --lcd-dark: #2f3b2f;
      --lcd-mid: #445244;
      --frame: #78856a;
      --button-bg: #cfcfcf;
      --button-border: #8e8e8e;
      --button-text: #2f2f2f;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #7d8790;
      font-family: "Courier New", Courier, monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      touch-action: none;
    }

    .game-wrapper {
      width: min(94vw, 420px);
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .screen {
      width: 100%;
      background: var(--lcd-bg);
      border: 4px solid var(--frame);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    }

    .screen-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: var(--lcd-dark);
      background: var(--lcd-bg);
      border-bottom: 2px solid var(--frame);
      padding: 8px 10px;
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .screen-area {
      position: relative;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--lcd-bg);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: var(--lcd-bg);
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      background: rgba(158, 173, 134, 0.94);
      color: var(--lcd-dark);
      text-align: center;
      padding: 20px;
    }

    .overlay.hidden {
      display: none;
    }

    .hidden {
      display: none;
    }

    .overlay-card {
      max-width: 300px;
    }

    .overlay-card h2 {
      margin: 0 0 12px;
      font-size: 1.3rem;
      letter-spacing: 1px;
    }

    .overlay-card p {
      margin: 8px 0;
      line-height: 1.4;
      font-size: 0.95rem;
    }

    .overlay-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 12px;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      width: 100%;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 14px;
    }

    button {
      appearance: none;
      border: 2px solid var(--button-border);
      background: linear-gradient(to bottom, #cfcfcf, #afafaf);
      color: var(--button-text);
      font: inherit;
      font-weight: bold;
      border-radius: 999px;
      padding: 10px 16px;
      cursor: pointer;
      min-width: 92px;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.5),
        0 2px 0 rgba(0,0,0,0.12);
    }

    button:active {
      transform: translateY(1px);
    }

    .mobile-pad {
      position: relative;
      width: 140px;
      height: 140px;
    }

    .mobile-pad button {
      position: absolute;
      min-width: 0;
      width: 56px;
      height: 56px;
      padding: 0;
      border-radius: 12px;
      font-size: 1.25rem;
    }

    .up {
      left: 42px;
      top: 0;
    }

    .left {
      left: 0;
      top: 42px;
    }

    .right {
      right: 0;
      top: 42px;
    }

    .down {
      left: 42px;
      top: 84px;
    }

    .hint {
      text-align: center;
      color: #2f2f2f;
      font-size: 0.82rem;
      margin-top: 2px;
      line-height: 1.35;
    }

    @media (min-width: 760px) {
      .mobile-pad {
        display: none;
      }
    }
  </style>
</head>

<body>
  <main class="game-wrapper">
    <section class="screen" aria-label="Snake display">
      <div class="screen-top">
        <span>SNAKE</span>
        <span>SCORE <span id="score">0</span></span>
      </div>

      <div class="screen-area">
        <canvas id="game" width="360" height="360"></canvas>

        <div id="overlay" class="overlay">
          <div class="overlay-card">
            <h2 id="overlayTitle">SNAKE</h2>
            <p id="overlayText">Use arrow keys, WASD, swipe, or the buttons.</p>
            <p>Eat food. Avoid yourself.</p>
            <div class="overlay-actions">
              <button id="startButton">START</button>
              <button id="cancelButton" class="hidden">CANCEL</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="controls">
      <div class="mobile-pad" aria-label="Touch controls">
        <button class="up" data-direction="up">▲</button>
        <button class="left" data-direction="left">◀</button>
        <button class="right" data-direction="right">▶</button>
        <button class="down" data-direction="down">▼</button>
      </div>

      <div class="action-row">
        <button id="pauseButton">PAUSE</button>
        <button id="restartButton">RESTART</button>
      </div>

      <div class="hint">
        Desktop: Arrow keys or WASD<br />
        Mobile: Swipe or use buttons
      </div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("game");
    const context = canvas.getContext("2d");

    const scoreElement = document.getElementById("score");
    const overlay = document.getElementById("overlay");
    const overlayTitle = document.getElementById("overlayTitle");
    const overlayText = document.getElementById("overlayText");
    const startButton = document.getElementById("startButton");
    const cancelButton = document.getElementById("cancelButton");
    const pauseButton = document.getElementById("pauseButton");
    const restartButton = document.getElementById("restartButton");

    const gridSize = 18;
    const tileCount = canvas.width / gridSize;

    const colors = {
      bg: "#9ead86",
      grid: "#8c9b76",
      snake: "#2f3b2f",
      food: "#445244"
    };

    const directions = {
      up: { x: 0, y: -1 },
      down: { x: 0, y: 1 },
      left: { x: -1, y: 0 },
      right: { x: 1, y: 0 }
    };

    let snake;
    let food;
    let direction;
    let nextDirection;
    let score;
    let gameInterval;
    let isRunning;
    let isPaused;
    let restartConfirmationPending = false;
    let restartConfirmationWasRunning = false;
    let speed;

    function resetGame() {
      snake = [
        { x: 10, y: 10 },
        { x: 9, y: 10 },
        { x: 8, y: 10 }
      ];

      direction = directions.right;
      nextDirection = directions.right;
      score = 0;
      speed = 180;
      isRunning = false;
      isPaused = false;

      updateScore();
      placeFood();
      drawGame();
    }

    function startGame() {
      clearInterval(gameInterval);
      isRunning = true;
      isPaused = false;
      pauseButton.textContent = "PAUSE";
      resetRestartConfirmation();
      overlay.classList.add("hidden");
      gameInterval = setInterval(gameLoop, speed);
    }

    function restartGame() {
      clearInterval(gameInterval);
      resetRestartConfirmation();
      resetGame();
      startGame();
    }

    function resetRestartConfirmation() {
      restartConfirmationPending = false;
      restartConfirmationWasRunning = false;
      restartButton.textContent = "RESTART";
      cancelButton.classList.add("hidden");
    }

    function requestRestart() {
      if (restartConfirmationPending) {
        restartGame();
        return;
      }

      restartConfirmationWasRunning = isRunning && !isPaused;
      restartConfirmationPending = true;
      restartButton.textContent = "CONFIRM";
      pauseButton.textContent = "CANCEL";
      cancelButton.classList.remove("hidden");
      showOverlay("RESTART?", "Confirm restart or cancel to resume.", "CONFIRM");

      if (restartConfirmationWasRunning) {
        clearInterval(gameInterval);
        isPaused = true;
      }
    }

    function cancelRestartConfirmation() {
      const shouldResume = restartConfirmationWasRunning;
      resetRestartConfirmation();
      overlay.classList.add("hidden");

      if (shouldResume) {
        isPaused = false;
        pauseButton.textContent = "PAUSE";
        gameInterval = setInterval(gameLoop, speed);
        return;
      }

      pauseButton.textContent = isPaused ? "RESUME" : "PAUSE";
    }

    function pauseGame() {
      if (!isRunning) return;

      if (restartConfirmationPending) {
        cancelRestartConfirmation();
        return;
      }

      resetRestartConfirmation();
      isPaused = !isPaused;
      pauseButton.textContent = isPaused ? "RESUME" : "PAUSE";

      if (isPaused) {
        clearInterval(gameInterval);
        showOverlay("PAUSED", "Press resume, space, or start.", "RESUME");
      } else {
        overlay.classList.add("hidden");
        gameInterval = setInterval(gameLoop, speed);
      }
    }

    function gameLoop() {
      direction = nextDirection;

      const head = {
        x: snake[0].x + direction.x,
        y: snake[0].y + direction.y
      };

      if (head.x < 0) head.x = tileCount - 1;
      if (head.x >= tileCount) head.x = 0;
      if (head.y < 0) head.y = tileCount - 1;
      if (head.y >= tileCount) head.y = 0;

      if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
        endGame();
        return;
      }

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score += 10;
        updateScore();
        placeFood();
        increaseSpeed();
      } else {
        snake.pop();
      }

      drawGame();
    }

    function increaseSpeed() {
      if (speed <= 110) return;

      speed -= 1;
      clearInterval(gameInterval);
      gameInterval = setInterval(gameLoop, speed);
    }

    function placeFood() {
      let newFood;

      do {
        newFood = {
          x: Math.floor(Math.random() * tileCount),
          y: Math.floor(Math.random() * tileCount)
        };
      } while (snake.some(segment => segment.x === newFood.x && segment.y === newFood.y));

      food = newFood;
    }

    function drawGame() {
      context.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();
      drawFood();
      drawSnake();
    }

    function drawGrid() {
      context.fillStyle = colors.bg;
      context.fillRect(0, 0, canvas.width, canvas.height);

      context.strokeStyle = colors.grid;
      context.lineWidth = 1;

      for (let i = 0; i <= tileCount; i++) {
        const position = i * gridSize;

        context.beginPath();
        context.moveTo(position, 0);
        context.lineTo(position, canvas.height);
        context.stroke();

        context.beginPath();
        context.moveTo(0, position);
        context.lineTo(canvas.width, position);
        context.stroke();
      }
    }

    function drawSnake() {
      snake.forEach((segment, index) => {
        context.fillStyle = colors.snake;

        const padding = 2;
        context.fillRect(
          segment.x * gridSize + padding,
          segment.y * gridSize + padding,
          gridSize - padding * 2,
          gridSize - padding * 2
        );

        if (index === 0) {
          drawSnakeEyes(segment);
        }
      });
    }

    function drawSnakeEyes(head) {
      context.fillStyle = colors.bg;

      const baseX = head.x * gridSize;
      const baseY = head.y * gridSize;
      const eyeSize = 2;

      if (direction.x !== 0) {
        context.fillRect(baseX + 5, baseY + 5, eyeSize, eyeSize);
        context.fillRect(baseX + 5, baseY + 11, eyeSize, eyeSize);
      } else {
        context.fillRect(baseX + 5, baseY + 5, eyeSize, eyeSize);
        context.fillRect(baseX + 11, baseY + 5, eyeSize, eyeSize);
      }
    }

    function drawFood() {
      context.fillStyle = colors.food;

      const x = food.x * gridSize + 4;
      const y = food.y * gridSize + 4;
      const size = gridSize - 8;

      context.fillRect(x, y, size, size);
    }

    function updateScore() {
      scoreElement.textContent = score;
    }

    function endGame() {
      clearInterval(gameInterval);
      isRunning = false;
      isPaused = false;
      pauseButton.textContent = "PAUSE";
      showOverlay("GAME OVER", `FINAL SCORE: ${score}`, "PLAY");
    }

    function showOverlay(title, text, buttonText) {
      overlayTitle.textContent = title;
      overlayText.textContent = text;
      startButton.textContent = buttonText;
      overlay.classList.remove("hidden");
    }

    function setDirection(newDirection) {
      const chosen = directions[newDirection];
      if (!chosen) return;

      if (restartConfirmationPending) return;

      const isOpposite =
        chosen.x + direction.x === 0 &&
        chosen.y + direction.y === 0;

      if (!isOpposite) {
        nextDirection = chosen;
      }
    }

    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();

      if (["arrowup", "w"].includes(key)) {
        event.preventDefault();
        setDirection("up");
      }

      if (["arrowdown", "s"].includes(key)) {
        event.preventDefault();
        setDirection("down");
      }

      if (["arrowleft", "a"].includes(key)) {
        event.preventDefault();
        setDirection("left");
      }

      if (["arrowright", "d"].includes(key)) {
        event.preventDefault();
        setDirection("right");
      }

      if (key === " " || key === "spacebar") {
        event.preventDefault();
        if (!isRunning) {
          startGame();
        } else {
          pauseGame();
        }
      }

      if (key === "enter" && !isRunning) {
        startGame();
      }
    });

    document.querySelectorAll("[data-direction]").forEach(button => {
      button.addEventListener("click", () => {
        setDirection(button.dataset.direction);
        if (!isRunning) {
          startGame();
        }
      });
    });

    startButton.addEventListener("click", () => {
      if (restartConfirmationPending) {
        restartGame();
        return;
      }

      if (isPaused) {
        pauseGame();
      } else {
        restartGame();
      }
    });

    cancelButton.addEventListener("click", cancelRestartConfirmation);
    pauseButton.addEventListener("click", pauseGame);
    restartButton.addEventListener("click", requestRestart);

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", event => {
      const touch = event.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: true });

    canvas.addEventListener("touchend", event => {
      const touch = event.changedTouches[0];
      const deltaX = touch.clientX - touchStartX;
      const deltaY = touch.clientY - touchStartY;

      if (Math.abs(deltaX) < 24 && Math.abs(deltaY) < 24) {
        return;
      }

      if (Math.abs(deltaX) > Math.abs(deltaY)) {
        setDirection(deltaX > 0 ? "right" : "left");
      } else {
        setDirection(deltaY > 0 ? "down" : "up");
      }

      if (!isRunning) {
        startGame();
      }
    }, { passive: true });

    resetGame();
  </script>
</body>
</html>
